services:
  db:
    image: timescale/timescaledb-ha:pg16   # PostGIS + TimescaleDB in one image
    environment:
      POSTGRES_USER: jejakudara
      POSTGRES_PASSWORD: jejakudara
      POSTGRES_DB: jejakudara
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jejakudara"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
